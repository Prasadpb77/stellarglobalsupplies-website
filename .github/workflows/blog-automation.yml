name: Blog Automation with AWS Bedrock Nova Pro

on:
  push:
    paths:
      - 'content/blog/**'
    branches: [main]
  workflow_dispatch:
    inputs:
      blog_file:
        description: 'Specific blog file to process (optional)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  process-blog:
    name: Process Blog with Bedrock Nova Pro
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Detect changed blog files
        id: detect-changes
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            if [ -n "${{ github.event.inputs.blog_file }}" ]; then
              CHANGED_FILES="${{ github.event.inputs.blog_file }}"
            else
              CHANGED_FILES=$(find content/blog -name "*.md" -type f | sort)
            fi
          else
            CHANGED_FILES=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep '^content/blog/.*\.md$' || true)
          fi

          if [ -z "$CHANGED_FILES" ]; then
            echo "No blog files changed"
            echo "changed_files=" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"
          
          echo "changed_files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Process each blog file
        if: steps.detect-changes.outputs.changed_files != ''
        run: |
          CHANGED_FILES="${{ steps.detect-changes.outputs.changed_files }}"
          
          echo "$CHANGED_FILES" | while read -r file; do
            if [ -z "$file" ]; then
              continue
            fi
            
            echo "Processing: $file"
            node .github/scripts/process-blog.js "$file"
          done

      - name: Configure AWS credentials using OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Generate blog implementation with Bedrock Nova Pro
        run: |
          CHANGED_FILES="${{ steps.detect-changes.outputs.changed_files }}"
          
          echo "$CHANGED_FILES" | while read -r file; do
            if [ -z "$file" ]; then
              continue
            fi
            
            echo "Generating implementation for: $file"
            
            # Extract slug from filename
            BLOG_SLUG=$(basename "$file" .md)
            
            # Pass FILE PATH (not content) to avoid shell escaping issues with large content
            node .github/scripts/call-bedrock.js "$file" "$BLOG_SLUG"
            
            # Apply the changes
            node .github/scripts/apply-blog-changes.js "$file" /tmp/blog-implementation.txt
          done

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          
          if [[ -z $(git status --porcelain) ]]; then
            echo "No changes to commit"
            exit 0
          fi
          
          git add -A
          
          FILE_COUNT=$(echo "${{ steps.detect-changes.outputs.changed_files }}" | wc -l)
          if [ "$FILE_COUNT" -eq 1 ]; then
            BLOG_TITLE=$(basename "${{ steps.detect-changes.outputs.changed_files }}" .md)
            COMMIT_MSG="feat: add blog post - $BLOG_TITLE"
          else
            COMMIT_MSG="feat: add $FILE_COUNT blog posts"
          fi
          
          git commit -m "$COMMIT_MSG"
          git push origin HEAD:main
          
          echo "✅ Changes committed and pushed"

      - name: Trigger deployment workflow
        if: success()
        run: |
          echo "✅ Blog automation complete. Deployment will be triggered by the push."